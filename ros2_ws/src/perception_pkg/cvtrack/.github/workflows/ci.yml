name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Don't run `pip install -e .` because torch/opencv wheels are large
          # and we mainly care about linting here.  Tests install them inside
          # the test job.
          pip install ruff mypy pytest

      - name: Lint (ruff)
        run: ruff check src tests scripts eval

      - name: Type-check (mypy, best-effort)
        continue-on-error: true
        run: mypy src || true

  test-fast:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + minimal deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Minimal CV / numerical stack for the test runner; CI doesn't need to
          # pull a YOLO model or run the tracker.
          pip install numpy opencv-python-headless pyyaml
          pip install -e .

      - name: Run tests (skip slow)
        run: |
          pytest -p no:anyio -m "not slow" tests/ -W ignore::DeprecationWarning
